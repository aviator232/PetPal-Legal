<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PetPal Legal</title>
    <style>
      :root {
        --bg: #f4f7f8;
        --card: #ffffff;
        --text: #1c252b;
        --muted: #56636f;
        --line: #dbe3e8;
        --brand: #0d6b75;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 28px;
      }
      h1 { margin-top: 0; }
      p { color: var(--muted); }
      .links {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }
      .link {
        display: block;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        text-decoration: none;
        color: var(--text);
      }
      .link:hover {
        border-color: var(--brand);
        background: #f0f7f8;
      }
      .title {
        color: var(--brand);
        font-weight: 700;
      }
      .sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>PetPal Legal</h1>
      <p>Public legal documents for PetPal - Pet Care Manager.</p>

      <section class="links">
        <a class="link" href="./privacy.html">
          <div class="title">Privacy Policy</div>
          <div class="sub">Last Updated: March 4, 2026</div>
        </a>
        <a class="link" href="./terms.html">
          <div class="title">Terms and Conditions</div>
          <div class="sub">Effective Date: March 4, 2026</div>
        </a>
      </section>
    </main>
  </body>
</html>
